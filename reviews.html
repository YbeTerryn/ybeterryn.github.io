<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Reviews - Pieter Paul Tybbe</title> 
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 20px 0; padding: 0 10px; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ffd166; background: transparent; color: #ffd166; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .filter-btn.active { background: #ffd166; color: #0d0d0d; }
        .slider-group { display: flex; flex-direction: column; align-items: center; color: #ffd166; font-size: 12px; }
        input[type=range] { cursor: pointer; width: 120px; accent-color: #ffd166; }
        .search-section { display: flex; justify-content: center; margin-bottom: 20px; }
    </style>
</head>
<body>
  
<header id="main-header"><nav id="main-nav"></nav></header>
<header class="sesjat-header">
  <p class="glyph">𓂀</p>
  <h1>Pieter Paul Tybbe</h1>
  <p class="subtitle">Reviews: Scherp, aandachtig en slechts licht bevooroordeeld</p>
</header>

<div class="filter-wrapper">
    <button class="filter-btn active" data-filter="all">ALLES</button>
    <button class="filter-btn" data-filter="storygraph">BOEKEN</button>
    <button class="filter-btn" data-filter="letterboxd">FILMS</button>
    <button class="filter-btn" data-filter="serializd">SERIES</button>
    
    <div class="slider-group">
        <span>Jaar: <span id="yearVal">alles</span></span>
        <input type="range" id="yearSlider" min="2020" max="2026" value="0">
    </div>

    <div class="slider-group">
        <span>Min. Rating: <span id="rateVal">0</span></span>
        <input type="range" id="ratingSlider" min="0" max="5" step="0.5" value="0">
    </div>
</div>

<div class="search-section">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" class="search-bar" placeholder="zoeken op titel/regisseur...">
  </div>
</div>

<main class="grid" id="main-container"></main>

<script src="data/stories.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById("main-container");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = document.querySelectorAll('.filter-btn');
    const yearSlider = document.getElementById("yearSlider");
    const ratingSlider = document.getElementById("ratingSlider");
    const yearVal = document.getElementById("yearVal");
    const rateVal = document.getElementById("rateVal");

    let currentList = (typeof reviewStories !== 'undefined') ? reviewStories : (typeof stories !== 'undefined' ? stories : []);
    let selectedPlatform = "all";

    // Zet slider bereik op basis van data
    const years = currentList.map(item => item.year).filter(y => y);
    const minYear = Math.min(...years);
    const maxYear = Math.max(...years);
    yearSlider.min = minYear;
    yearSlider.max = maxYear;
    yearSlider.value = minYear;

    function getStarsHtml(rating) {
        if (!rating) return "";
        let stars = '<div class="rating">';
        for (let i = 1; i <= 5; i++) {
            let diff = rating - (i - 1);
            if (diff >= 0.95) stars += '<i class="fas fa-star"></i>';
            else if (diff >= 0.50) stars += '<i class="fas fa-star-half-alt"></i>';
            else stars += '<i class="far fa-star"></i>';
        }
        return stars + `<span class="rating-number">${rating}</span></div>`;
    }

    function render() {
        if (!container) return;
        container.innerHTML = "";
        
        const searchTerm = searchInput.value.toLowerCase();
        const minYearVal = parseInt(yearSlider.value);
        const minRateVal = parseFloat(ratingSlider.value);
        
        yearVal.innerText = minYearVal;
        rateVal.innerText = minRateVal;

        const filtered = currentList.filter(item => {
            const matchesSearch = item.title.toLowerCase().includes(searchTerm) || (item.director && item.director.toLowerCase().includes(searchTerm));
            const matchesPlatform = (selectedPlatform === "all" || item.platform === selectedPlatform);
            const matchesYear = (item.year >= minYearVal);
            const matchesRating = (item.rating >= minRateVal);
            return matchesSearch && matchesPlatform && matchesYear && matchesRating;
        });

        [...filtered].reverse().forEach(item => {
            const card = document.createElement("article");
            card.className = "card";
            const slugify = (t) => t?.toLowerCase().replace(/[’']/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            card.innerHTML = `<div class="card-content"><img src="${item.image}" alt="${item.title}" class="card-image"><div class="card-text"><h2>${item.title}</h2>${getStarsHtml(item.rating)}<p class="meta">${item.year || item.date || ""}</p>${item.director ? `<p class="meta-info"><em>${item.director}</em></p>` : ""}<a href="story.html?id=${item.id || slugify(item.title)}" class="read-link">📖 LEES REVIEW</a></div></div>`;
            container.appendChild(card);
        });
        if (filtered.length === 0) container.innerHTML = "<p class='no-results'>Niets gevonden...</p>";
    }

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedPlatform = btn.getAttribute('data-filter');
            render();
        });
    });

    searchInput.addEventListener('input', render);
    yearSlider.addEventListener('input', render);
    ratingSlider.addEventListener('input', render);
    render();
});

fetch('nav.html').then(res => res.text()).then(data => { const nav = document.getElementById('main-nav'); if(nav) nav.innerHTML = data; });
</script>
</body>
</html>
