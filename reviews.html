<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Reviews - Pieter Paul Tybbe</title> 
    <link rel="stylesheet" href="css/style.css">
    <style>
        #filter-panel { display: none; margin: 20px auto; padding: 20px; background: #1a1a1a; border-radius: 8px; max-width: 500px; color: #fff; }
        #filter-panel.show { display: block; }
        .filter-controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .toggle-btn { background: #ffd166; color: #0d0d0d; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 20px; }
        select { padding: 8px; background: #333; color: #fff; border: 1px solid #ffd166; border-radius: 4px; width: 100%; max-width: 250px; }
    </style>
</head>
<body>

<header id="main-header"><nav id="main-nav"></nav></header>

<div style="text-align: center;">
    <button id="toggle-filter" class="toggle-btn"><i class="fas fa-filter"></i> FILTERS</button>
</div>

<div id="filter-panel">
    <div class="filter-controls">
        <label>Jaar vanaf:</label>
        <select id="yearFilter">
            <option value="0">Alle jaren</option>
            <!-- Wordt via JS gevuld -->
        </select>
        
        <label>Rating:</label>
        <select id="ratingFilter">
            <option value="0-5">Alles</option>
            <option value="4-5">4 tot 5 sterren</option>
            <option value="3-4">3 tot 4 sterren</option>
            <option value="2-3">2 tot 3 sterren</option>
            <option value="0-3">Minder dan 3 sterren</option>
        </select>
    </div>
</div>

<div class="search-section" style="text-align: center; margin-bottom: 20px;">
    <input type="text" id="searchInput" class="search-bar" placeholder="zoeken op titel...">
</div>

<main class="grid" id="main-container"></main>

<script src="data/stories.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById("main-container");
    const searchInput = document.getElementById("searchInput");
    const toggleFilter = document.getElementById("toggle-filter");
    const filterPanel = document.getElementById("filter-panel");
    const yearFilter = document.getElementById("yearFilter");
    const ratingFilter = document.getElementById("ratingFilter");

    let currentList = (typeof reviewStories !== 'undefined') ? reviewStories : (typeof stories !== 'undefined' ? stories : []);

    // Vul jaar filter
    const years = [...new Set(currentList.map(item => item.year).filter(y => y))].sort((a, b) => b - a);
    years.forEach(year => {
        const option = document.createElement("option");
        option.value = year;
        option.text = year;
        yearFilter.appendChild(option);
    });

    toggleFilter.addEventListener('click', () => filterPanel.classList.toggle('show'));

    function render() {
        container.innerHTML = "";
        const searchTerm = searchInput.value.toLowerCase();
        const minYear = parseInt(yearFilter.value);
        const [minRate, maxRate] = ratingFilter.value.split('-').map(Number);

        const filtered = currentList.filter(item => {
            const matchesSearch = item.title.toLowerCase().includes(searchTerm);
            const matchesYear = (minYear === 0 || item.year >= minYear);
            const matchesRating = (item.rating >= minRate && item.rating <= maxRate);
            return matchesSearch && matchesYear && matchesRating;
        });

        [...filtered].reverse().forEach(item => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `<div class="card-content">
                <img src="${item.image}" alt="${item.title}" class="card-image">
                <div class="card-text">
                    <h2>${item.title}</h2>
                    <p>${item.year || ""} - ${item.rating} sterren</p>
                    <a href="story.html?id=${item.id || ''}" class="read-link">LEES REVIEW</a>
                </div>
            </div>`;
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', render);
    yearFilter.addEventListener('change', render);
    ratingFilter.addEventListener('change', render);
    render();
});
</script>
</body>
</html>
