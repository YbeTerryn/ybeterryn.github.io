<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Reviews - Pieter Paul Tybbe</title> 
    <link rel="stylesheet" href="css/style.css">
    <style>
        #filter-panel { display: none; margin: 20px auto; padding: 20px; background: #1a1a1a; border-radius: 8px; max-width: 500px; color: #fff; }
        #filter-panel.show { display: block; }
        .filter-group { margin-bottom: 15px; }
        .range-inputs { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; background: #333; color: #fff; border: 1px solid #ffd166; border-radius: 4px; flex: 1; }
        .toggle-btn { background: #ffd166; color: #0d0d0d; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<header id="main-header"><nav id="main-nav"></nav></header>

<div style="text-align: center;">
    <button id="toggle-filter" class="toggle-btn"><i class="fas fa-filter"></i> FILTERS</button>
</div>

<div id="filter-panel">
    <!-- Jaar Range -->
    <div class="filter-group">
        <label>Jaar bereik:</label>
        <div class="range-inputs">
            <select id="minYear"><option value="0">Vanaf</option></select>
            <span>-</span>
            <select id="maxYear"><option value="9999">Tot</option></select>
        </div>
    </div>
    <!-- Rating Range -->
    <div class="filter-group">
        <label>Rating bereik:</label>
        <div class="range-inputs">
            <select id="minRate">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <span>-</span>
            <select id="maxRate">
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>
        </div>
    </div>
</div>

<div class="search-section" style="text-align: center; margin-bottom: 20px;">
    <input type="text" id="searchInput" class="search-bar" placeholder="zoeken op titel...">
</div>

<main class="grid" id="main-container"></main>

<script src="data/stories.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById("main-container");
    const searchInput = document.getElementById("searchInput");
    const toggleFilter = document.getElementById("toggle-filter");
    const filterPanel = document.getElementById("filter-panel");
    const minYear = document.getElementById("minYear");
    const maxYear = document.getElementById("maxYear");
    const minRate = document.getElementById("minRate");
    const maxRate = document.getElementById("maxRate");

    let currentList = (typeof reviewStories !== 'undefined') ? reviewStories : (typeof stories !== 'undefined' ? stories : []);

    // Vul jaren in
    const years = [...new Set(currentList.map(item => item.year).filter(y => y))].sort((a, b) => b - a);
    years.forEach(year => {
        minYear.innerHTML += `<option value="${year}">${year}</option>`;
        maxYear.innerHTML += `<option value="${year}">${year}</option>`;
    });

    toggleFilter.addEventListener('click', () => filterPanel.classList.toggle('show'));

    function render() {
        container.innerHTML = "";
        const searchTerm = searchInput.value.toLowerCase();
        
        const filtered = currentList.filter(item => {
            const matchesSearch = item.title.toLowerCase().includes(searchTerm);
            const matchesYear = (item.year >= parseInt(minYear.value) && item.year <= parseInt(maxYear.value));
            const matchesRating = (item.rating >= parseFloat(minRate.value) && item.rating <= parseFloat(maxRate.value));
            return matchesSearch && matchesYear && matchesRating;
        });

        [...filtered].reverse().forEach(item => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `<div class="card-content">
                <img src="${item.image}" alt="${item.title}" class="card-image">
                <div class="card-text">
                    <h2>${item.title}</h2>
                    <p>${item.year || ""} - ${item.rating} sterren</p>
                    <a href="story.html?id=${item.id || ''}" class="read-link">LEES REVIEW</a>
                </div>
            </div>`;
            container.appendChild(card);
        });
    }

    [searchInput, minYear, maxYear, minRate, maxRate].forEach(el => el.addEventListener('change', render));
    render();
});
</script>
</body>
</html>
