<!DOCTYPE html>
<html lang="nl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJ1V2PREL6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MJ1V2PREL6');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Offers voor Sesjat</title> 
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Maak de hele kaart een aanklikbare link zonder standaard link-opmaak */
        .card { display: block; text-decoration: none; color: inherit; cursor: pointer; }
    </style>
</head>
<body>
  
<header id="main-header">
    <nav id="main-nav"></nav>
</header>

<header class="sesjat-header">
    <p class="glyph">𓇇</p>
    <h1>Offers voor Sesjat</h1>
    <p class="subtitle">Maandelijks een literair werk <br>Een offer voor de godin van het schrift</p>
</header>

<div class="filter-section">
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-bar" placeholder="Offers zoeken...">
    </div>
</div>
  
<main class="grid" id="main-container"></main>

<script src="data/stories.js"></script>

<script>
function slugify(text) {
    return text.toString().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '-');
}

window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById("main-container");
    const searchInput = document.getElementById("searchInput");

    let currentList = [];
    const pageTitle = document.title;
    
    if (pageTitle.includes("Offers")) currentList = typeof stories !== 'undefined' ? stories : [];
    else if (pageTitle.includes("Archief")) currentList = typeof archiveStories !== 'undefined' ? archiveStories : [];
    else if (pageTitle.includes("Reviews")) currentList = typeof reviewStories !== 'undefined' ? reviewStories : [];

    function render(filter = "") {
        container.innerHTML = "";
        const searchTerm = filter.toLowerCase();

        const filtered = currentList.filter(item => {
            return item.title.toLowerCase().includes(searchTerm) || 
                   (item.year && item.year.toString().includes(searchTerm)) ||
                   (item.director && item.director.toLowerCase().includes(searchTerm)) ||
                   (item.date && item.date.toLowerCase().includes(searchTerm));
        });

        filtered.slice().reverse().forEach(item => {
            const isExternal = !!item.link;
            const slug = slugify(item.title);
            const link = isExternal ? item.link : `story.html?id=${slug}`;
            
            // Probeer eerst item.image, dan images/slug.jpg
            const displayImage = item.image || `images/${slug}.jpg`;
            
            const card = document.createElement("a");
            card.className = "card";
            card.href = link;
            if (isExternal) {
                card.target = "_blank";
                card.rel = "noopener noreferrer";
            }
            
            // De onerror zorgt dat hij bij een fout naar de Draft map springt met de .png extensie
            card.innerHTML = `
                <div class="card-content">
                    <img src="${displayImage}" 
                         alt="${item.title}" 
                         class="card-image" 
                         onerror="this.onerror=null; this.src='Draft/${slug}storyid.png';">
                    <div class="card-text">
                        <h2>${item.title}</h2>
                        <p class="meta">${item.year || item.date || ""}</p>
                        ${item.director ? `<p class="meta-info"><em>${item.director}</em></p>` : ""}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        if (filtered.length === 0) {
            container.innerHTML = "<p class='no-results'>Niets gevonden...</p>";
        }
    }

    if (searchInput) {
        searchInput.addEventListener('input', (e) => render(e.target.value));
    }

    render();
});

fetch('nav.html').then(res => res.text()).then(data => {
    const nav = document.getElementById('main-nav');
    if(nav) nav.innerHTML = data;
});
</script>

</body>
</html>
