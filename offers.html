<!DOCTYPE html>
<html lang="nl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJ1V2PREL6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MJ1V2PREL6');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Offers voor Sesjat</title> 
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card { position: relative; cursor: pointer; }
        .card-link-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .card-content { position: relative; z-index: 5; pointer-events: none; }
        .death-link { pointer-events: auto; color: #d4af37; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
  
<header id="main-header"><nav id="main-nav"></nav></header>

<header class="sesjat-header">
    <p class="glyph">𓇇</p>
    <h1>Offers voor Sesjat</h1>
    <p class="subtitle">Maandelijks een literair werk <br>Een offer voor de godin van het schrift</p>
</header>

<div class="filter-section">
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-bar" placeholder="Offers zoeken...">
    </div>
</div>
  
<main class="grid" id="main-container"></main>

<script src="data/stories.js"></script>
<script>
function slugify(text) {
    return text.toString().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '-');
}

window.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById("main-container");
    const searchInput = document.getElementById("searchInput");
    let currentList = (document.title.includes("Offers")) ? stories : [];

    function render(filter = "") {
        container.innerHTML = "";
        const searchTerm = filter.toLowerCase();
        const filtered = currentList.filter(item => item.title.toLowerCase().includes(searchTerm));

        filtered.slice().reverse().forEach(item => {
            const card = document.createElement("article");
            card.className = "card";
            const slug = slugify(item.title);
            const link = item.link ? item.link : `story.html?id=${slug}`;
            const target = item.link ? 'target="_blank"' : '';

            card.innerHTML = `
                <a href="${link}" ${target} class="card-link-overlay"></a>
                <div class="card-content">
                    <img src="${item.image || `images/${slug}.jpg`}" alt="${item.title}" class="card-image">
                    <div class="card-text">
                        <h2>${item.title}</h2>
                        <p class="meta">${item.year || item.date || ""}</p>
                        <span class="death-link">LEES</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => render(e.target.value));
    render();
});

fetch('nav.html').then(res => res.text()).then(data => document.getElementById('main-nav').innerHTML = data);
</script>
</body>
</html>
