<!DOCTYPE html>
<html lang="nl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MJ1V2PREL6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MJ1V2PREL6');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ybeterryn.be | Verhaal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: #0d0d0d;
            color: #f2f2f2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        #story-title {
            font-size: 36px;
            color: #ffd166;
            margin-bottom: 5px;
            text-align: center;
            font-family: serif;
        }
        #story-meta {
            text-align: center;
            color: #aaa;
            font-size: 16px;
            margin-bottom: 25px;
            font-style: italic;
            line-height: 1.6;
        }
        /* Nieuwe stijl voor de ingesloten afbeelding */
        .story-image-float {
            width: 250px;
            float: left;
            margin-right: 25px;
            margin-bottom: 15px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
        }
        #text-container {
            font-size: 18px;
            line-height: 1.8;
            color: #e0e0e0;
        }
        /* Zorgt dat de tekst netjes om de afbeelding heen vloeit */
        #text-container::after {
            content: "";
            clear: both;
            display: table;
        }
        #text-container p {
            margin-bottom: 20px;
        }
        .suggestion-card {
            text-decoration: none; 
            color: inherit; 
            width: 280px; 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ffd166; 
            transition: transform 0.2s, background 0.2s, border-color 0.2s; 
            text-align: left; 
            display: block; 
            box-sizing: border-box;
        }
        .suggestion-card:hover {
            transform: translateY(-5px);
            border-color: #fff !important;
            background: #252525 !important;
        }
        /* Mobiele optimalisatie */
        @media (max-width: 600px) {
            .story-image-float {
                float: none;
                width: 100%;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header id="main-header">
            <nav id="main-nav"></nav>
        </header>

        <h1 id="story-title">Verhaal laden...</h1>
        <div id="story-meta"></div>
        
        <article id="text-container" class="literary-text"></article>
        
        <div class="like-section" style="text-align: center; padding: 40px 0; border-top: 1px solid rgba(255, 209, 102, 0.1); margin-top: 40px;">
            <p style="font-style: italic; font-size: 1rem; margin-bottom: 15px; font-family: serif; color: white;">
                Laat weten wat je ervan vond!
            </p>
            <div id="like-container" style="min-height: 80px; display: flex; justify-content: center; align-items: center;"></div>
        </div>

        <section class="reader-feedback" style="margin-bottom: 50px;">
            <h2 style="color: #ffd166; font-family: serif;">Reacties</h2>
            <div id="cusdis_thread" 
                 data-host="https://cusdis.com" 
                 data-app-id="e2ce094f-0f93-4f5c-8ea9-f364505c967f" 
                 data-lang="nl"
                 data-theme="dark">
            </div>
        </section>

        <div id="suggestions-container"></div>

        <div style="text-align: center; margin: 40px 0;">
            <a href="index.html" style="color: #ffd166; text-decoration: none; font-variant: small-caps; border: 1px solid #ffd166; padding: 10px 20px;">
                ← Terug naar alle verhalen
            </a>
        </div>
    </div>

    <script src="data/stories.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_J1Up8Uof5CXvPT4SQ30er20hL2Qy6Cw",
            authDomain: "sesjat-549da.firebaseapp.com",
            projectId: "sesjat-549da",
            storageBucket: "sesjat-549da.firebasestorage.app",
            messagingSenderId: "845325090016",
            appId: "1:845325090016:web:358412e188aad787fee485",
            measurementId: "G-J8QZD6VXTX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const slugify = (text) => text?.toLowerCase().replace(/[’']/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get("id");
            const textContainer = document.getElementById("text-container");
            const titleElement = document.getElementById("story-title");
            const metaElement = document.getElementById("story-meta");

            const allStories = [
                ...(typeof stories !== 'undefined' ? stories : []), 
                ...(typeof archiveStories !== 'undefined' ? archiveStories : []),
                ...(typeof reviewStories !== 'undefined' ? reviewStories : [])
            ];
            
            const story = allStories.find(s => (s.id && s.id === storyId) || (s.title && slugify(s.title) === storyId));

            if (!story) {
                titleElement.innerText = "Niet gevonden";
                textContainer.innerText = "Verhaal of review niet gevonden.";
                return;
            }

            const firebaseDocId = story.id || slugify(story.title);
            const textPath = story.text || `reviews/${slugify(story.title)}.html`;

            fetch(textPath)
                .then(res => res.text())
                .then(htmlContent => {
                    titleElement.innerText = story.title;
                    document.title = `${story.title} | Pieter Paul Tybbe`;
                    
                    // Meta gegevens
                    let metaText = (story.director && story.year) ? `${story.platform === 'serializd' ? 'Gemaakt' : 'Geregisseerd'} door ${story.director} (${story.year}) — Rating: ${story.rating || 'N/A'}/5` : (story.date || "");
                    metaElement.innerHTML = story.link ? `${metaText}<br><a href="${story.link}" target="_blank" rel="noopener noreferrer" style="color: #ffd166; font-size: 0.8rem; text-decoration: none; font-variant: small-caps; display: inline-block; margin-top: 8px;"><i class="fa-solid fa-arrow-up-right-from-square" style="margin-right: 4px;"></i> Bekijk op ${story.platform || 'Platform'}</a>` : metaText;

                    // Ingesloten afbeelding logica
                    let content = htmlContent;
                    if (!htmlContent.includes('<p>') && !htmlContent.includes('<br>')) {
                        content = htmlContent.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
                    }
                    
                    if (story.image) {
                        textContainer.innerHTML = `<img src="${story.image}" alt="${story.title}" class="story-image-float">` + content;
                    } else {
                        textContainer.innerHTML = content;
                    }

                    setupLikes(firebaseDocId);
                    
                    // Suggesties
                    const suggestionsContainer = document.getElementById('suggestions-container');
                    const otherStories = allStories.filter(s => s.title !== story.title);
                    if (otherStories.length > 0 && suggestionsContainer) {
                        const selected = otherStories.sort(() => 0.5 - Math.random()).slice(0, 2);
                        let html = `<div style="text-align:center; margin-top: 50px; padding-top: 30px; border-top: 1px solid #333;"><h3 style="color: #fff; font-family: serif;">Zin in nog een verhaal?</h3><div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">`;
                        selected.forEach(s => {
                            html += `<a href="${window.location.pathname}?id=${s.id || slugify(s.title)}" class="suggestion-card">${s.image ? `<img src="${s.image}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; display:block;">` : ''}<h4 style="margin: 0 0 8px 0; color: #ffd166; font-family: serif;">${s.title}</h4><p style="margin: 0; font-size: 14px;">Klik hier &rarr;</p></a>`;
                        });
                        suggestionsContainer.innerHTML = html + `</div></div>`;
                    }
                });
        });

        async function setupLikes(storyId) {
            const likeContainer = document.getElementById('like-container');
            const docRef = doc(db, "likes", storyId);
            likeContainer.innerHTML = `<div style="text-align:center; font-family: serif;"><button id="like-button" style="background:none; border:none; cursor:pointer; padding:0; transition: transform 0.2s;"><i class="fa-solid fa-heart" style="color: #ebbb2d; font-size: 2.5rem;"></i></button><div id="like-count" style="color: #ebbb2d; font-size: 1.1rem; font-weight: bold; margin-top: 8px;">...</div></div>`;
            const countDisplay = document.getElementById('like-count');
            try {
                const snap = await getDoc(docRef);
                countDisplay.innerText = snap.exists() ? snap.data().count : "0";
            } catch(e) { countDisplay.innerText = "0"; }
            document.getElementById('like-button').onclick = async () => {
                await updateDoc(docRef, { count: increment(1) });
                countDisplay.innerText = (await getDoc(docRef)).data().count;
            };
        }
    </script>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
</body>
</html>
